# --- KITTY: THE VOID THEME ---
font_family      JetBrains Mono
font_size        11.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# Zero Window Padding for maximum screen utility
window_padding_width 0

# The Void Colors
foreground       #ffffff
background       #000000
selection_foreground #000000
selection_background #ffffff

# Remove title bar and window decorations
hide_window_decorations yes
confirm_os_window_close 0

# Cursor
cursor           #ffffff
cursor_shape     block
shell_integration disabled

# --- Typography ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window Aesthetics ---
background_opacity 0.85
window_padding_width 10

# --- Tokyo Night Storm Palette ---
background #24283b
foreground #c0caf5
selection_background #364A82
selection_foreground #c0caf5
url_color #73daca
cursor #c0caf5
cursor_text_color #1a1b26

# Normal Colors
color0 #1d202f
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6

# Bright Colors
color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5
