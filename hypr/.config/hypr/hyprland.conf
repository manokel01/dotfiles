# --- THE VOID: NATIVE ARCHITECTURE ---

# Monitors (Standard P14s scaling)
monitor=eDP-1,preferred,auto,1

# Core Components Launch
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = hyprctl keyword misc:background_color 0x000000
exec-once = swayosd-server
# Clipboard: History persistence
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Set the background color to black via the compositor
exec-once = hyprctl keyword misc:background_color 0x000000

# Input: Optimized for P14s Trackpad & Keyboard
input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = no  # Set to 'no' if you want "Normal" (Windows-style) scrolling
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# General: Zero Gaps, High Contrast
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(000000ff)
    layout = dwindle

    # Mac-style edge resizing
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
}

# Decoration: Pure Euclidean Geometry (No Rounding)
decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

# Minimalist Animations
animations {
    enabled = true
    animation = windows, 1, 3, default, slide
    animation = workspaces, 1, 2, default, slidefade 20%
}

# Essential Keybinds
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d-%H%M%S.png')

bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Workspace Navigation
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# --- Window Movement ---
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mouse bindings for window management
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- HARDWARE CONTROLS (Global Silence) ---
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise &> /dev/null
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower &> /dev/null
bindl  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle &> /dev/null
bindl  = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle &> /dev/null

bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = 0x000000
}
