# --- THE VOID: NATIVE ARCHITECTURE ---

# Monitors (Standard P14s scaling)
monitor=eDP-1,preferred,auto,1

# Core Components Launch
exec-once = waybar
exec-once = nm-applet --indicator
# Set the background color to black via the compositor
exec-once = hyprctl keyword misc:background_color 0x000000

# Input: Optimized for P14s Trackpad & Keyboard
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # No acceleration for precision

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
        tap-to-click = true
        disable_while_typing = true
    }
}

# General: Zero Gaps, High Contrast
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(000000ff)
    layout = dwindle
}

# Decoration: Pure Euclidean Geometry (No Rounding)
decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

# Minimalist Animations
animations {
    enabled = true
    animation = windows, 1, 3, default, slide
    animation = workspaces, 1, 2, default, slidefade 20%
}

# Essential Keybinds
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d-%H%M%S.png')

# Workspace Navigation
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = 0x000000
}
