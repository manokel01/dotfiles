# --- THE VOID: NATIVE ARCHITECTURE (UWSM MANAGED) ---

# --- ENVIRONMENT VARIABLES ---
env = GDK_SCALE,1.2
env = XCURSOR_THEME,Nordzy-cursors-white
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Nordzy-hyprcursors-white
env = HYPRCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DBUS_REMOTE,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_AUTO_SCREEN_SCALE_FACTOR,0
env = QT_ENABLE_HIGHDPI_SCALING,0
env = QT_SCALE_FACTOR,1
env = GTK_USE_PORTAL,1
env = MOZ_ENABLE_WAYLAND,1

# --- UWSM CORE COMPONENTS LAUNCH ---
# Bridge Hyprland environment to D-Bus/Systemd (Critical for portals/Brave)
exec-once = sleep 0.5 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = uwsm app -- waybar
# exec-once = uwsm app -- nm-applet --indicator
exec-once = uwsm app -- swayosd-server
exec-once = uwsm app -- /usr/libexec/hyprpolkitagent
exec-once = uwsm app -- elephant
exec-once = uwsm app -- walker --gapplication-service

# Clipboard: History persistence
exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store
exec-once = uwsm app -- gnome-keyring-daemon --start --components=secrets

# --- CUSTOM BACKGROUND SERVICES ---
# These are now called from your global bin via the stow links
exec-once = uwsm app -- /home/manokel/.local/bin/battery_notify.sh
exec-once = uwsm app -- /home/manokel/.local/bin/fix_webcam.sh

# --- EXTERNAL DRIVE MOUNT/EJECT SERVICE (udiskie) ---
exec-once = bash -c "sleep 2 && uwsm app -- udiskie -t"

# Idle: dim → lock → dpms off → suspend
exec-once = uwsm app -- hypridle

# Input: Optimized for P14s & NuPhy Hardware Swaps
input {
    kb_layout = us,gr
    kb_variant = altgr-intl,
    # ADDED: Emergency Alt+Shift toggle for lock screen recovery
    kb_options = level3:ralt_switch,grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0              

    touchpad {
        natural_scroll = no
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
        middle_button_emulation = true
    }
}

# --- THINKPAD INTERNAL KEYBOARD SWAP ---
# Targets only the laptop deck to match the NuPhy's firmware-level swap
device {
    name = at-translated-set-2-keyboard
    kb_options = altwin:swap_lalt_lwin,level3:ralt_switch,grp:alt_shift_toggle
}

# General: Zero Gaps, High Contrast
general {
    gaps_in = 0    
    gaps_out = 0   
    border_size = 2
    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(000000ff)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
}

# Decoration: Pure Euclidean Geometry (No Rounding)
decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

# Minimalist Animations (Optimized for battery)
animations {
    enabled = true
    animation = windows, 1, 3, default, slide
    animation = workspaces, 1, 2, default, slidefade 20%
}

# Essential Keybinds
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, exec, sh -c 'hyprctl activewindow | grep -iq "viber" && flatpak kill com.viber.Viber || hyprctl dispatch killactive'
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin 
bind = $mainMod, D, exec, walker
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d-%H%M%S.png')
bind = $mainMod SHIFT, V, exec, walker -m clipboard
bind = $mainMod SHIFT, E, exec, kitty --class floating_terminal yazi
bind = SUPER SHIFT, W, exec, killall waybar; sleep 0.5; uwsm app -- waybar
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, P, exec, kitty --class vault_tui -e /home/manokel/.local/bin/pass-picker.sh
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Dedicated Suspend Button (NuPhy F14)
bindl = , XF86Launch5, exec, systemctl suspend

# ThinkPad Screenshot Key
bind = , Print, exec, /home/manokel/.local/bin/screenshot.sh
# NuPhy Screenshot Key
bind = , XF86Tools, exec, /home/manokel/.local/bin/screenshot.sh

# --- LANGUAGE SWITCHING ---
bind = $mainMod, Space, exec, hyprctl switchxkblayout all next

# Workspace Navigation
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# --- Window Movement (To Workspaces) ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4

# --- Window Movement (Local) ---
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mouse bindings for window management
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- HARDWARE CONTROLS (Knob, Screen & Volume) ---
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise &> /dev/null
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower &> /dev/null
bindl  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle &> /dev/null
bindl  = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle &> /dev/null
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise & ddcutil --display 1 --noverify setvcp 10 + 5
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower & ddcutil --display 1 --noverify setvcp 10 - 5

# --- NUPHY AIR75 V3 MEDIA & SYSTEM BINDS ---
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bind = , F3, exec, walker -m windows
bind  = , XF86Search, exec, walker
bindl = , XF86Sleep, exec, systemctl suspend

# --- CROSS-MONITOR NAVIGATION ---
bind = $mainMod, period, focusmonitor, +1
bind = $mainMod, comma, focusmonitor, -1
bind = $mainMod SHIFT, period, movewindow, mon:+1
bind = $mainMod SHIFT, comma, movewindow, mon:-1

# --- NOTIFICATION CENTER TOGGLE ---
bind = SUPER, N, exec, swaync-client -t -sw

# --- MONITOR ARCHITECTURE ---
monitor=eDP-1, 1920x1200@60, 0x0, 1
monitor=DP-2, 3840x2160@60, 1920x0, 1.0

# --- HARDWARE CLAMSHELL MODE (MIGRATION ENABLED) ---
# When lid closes: Disable internal, move everything to DP-2
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable" && hyprctl dispatch moveworkspacetomonitor 1 DP-2 && hyprctl dispatch moveworkspacetomonitor 2 DP-2 && hyprctl dispatch moveworkspacetomonitor 3 DP-2 && hyprctl dispatch moveworkspacetomonitor 4 DP-2
# When lid opens: Restore internal monitor
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 1920x1200@60, 0x0, 1"

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = rgb(24283b) 
}

# --- CAMERA ---
exec-once = uwsm app -- /home/manokel/.local/bin/fix_webcam.sh
bind = $mainMod ALT, C, exec, /home/manokel/.local/bin/fix_webcam.sh

# --- WINDOW RULES ---
windowrule {
    name = floating_tui_apps
    match:class = ^(floating_terminal)$
    float = on
    center = on
    size = 1000 600
}

windowrule {
    name = obsbot_meeting_term
    match:title = ^(OBSBOT-Meeting-Terminal)$
    float = on
    size = 400 200
    move = 1500 50
    pin = on
}

# New Guarded Sync Window
windowrule {
    name = rclone_guarded_sync
    match:class = ^(sync_floats)$
    float = on
    center = on
    size = 1000 700
}

# Bitwarden fzf Vault
windowrule {
    name = vault_fzf_terminal
    match:class = ^(vault_tui)$
    float = on
    center = on
    size = 800 500
}

# --- LIBREOFFICE RULES ---

# 1. Prevent Maximize Hijacking
windowrule {
    name = libreoffice_guard
    match:class = ^(libreoffice.*)$
    suppress_event = fullscreen maximize
}

# 2. Force Enforce Tiling (Override Dialog defaults)
windowrule {
    name = libreoffice_force_tile
    match:class = ^(libreoffice.*)$
    float = off
float = off
}
