# --- THE VOID: NATIVE ARCHITECTURE ---

# --- ENVIRONMENT VARIABLES ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_SCALE,1.2

# Core Components Launch
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = swayosd-server
exec-once = /usr/libexec/polkit-mate-authentication-agent-1

# Clipboard: History persistence
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle: dim → lock → dpms off → suspend
exec-once = hypridle

# Input: Optimized for P14s Trackpad & Keyboard
input {
    kb_layout = us,gr
    kb_options = grp:alt_caps_toggle
    follow_mouse = 1

    touchpad {
        natural_scroll = no  # Enabled per your README rules
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }
}

# General: Zero Gaps, High Contrast
general {
    gaps_in = 0    # Sharp Euclidean alignment
    gaps_out = 0   # Sharp Euclidean alignment
    border_size = 2
    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(000000ff)
    layout = dwindle

    # Mac-style edge resizing
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
}

# Decoration: Pure Euclidean Geometry (No Rounding)
decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

# Minimalist Animations (Optimized for battery)
animations {
    enabled = true
    animation = windows, 1, 3, default, slide
    animation = workspaces, 1, 2, default, slidefade 20%
}

# Essential Keybinds
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar # Corrected from dolphin
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d-%H%M%S.png')
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Workspace Navigation
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# --- Window Movement ---
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mouse bindings for window management
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- HARDWARE CONTROLS ---
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise &> /dev/null
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower &> /dev/null
bindl  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle &> /dev/null
bindl  = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle &> /dev/null
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise & ddcutil --display 1 --noverify setvcp 10 + 5
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower & ddcutil --display 1 --noverify setvcp 10 - 5

# --- CROSS-MONITOR NAVIGATION ---
bind = $mainMod, period, focusmonitor, +1
bind = $mainMod, comma, focusmonitor, -1
bind = $mainMod SHIFT, period, movewindow, mon:+1
bind = $mainMod SHIFT, comma, movewindow, mon:-1

# --- MONITOR ARCHITECTURE ---
monitor=eDP-1, 1920x1200@60, 0x0, 1
monitor=DP-2, 3840x2160@60, 1920x0, 1.0

# --- LID SWITCH LOGIC ---
bindl=,switch:on:Lid Switch,exec,hyprctl keyword monitor "eDP-1, disable"
bindl=,switch:off:Lid Switch,exec,hyprctl keyword monitor "eDP-1, 1920x1200@60, 0x0, 1"

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = rgb(24283b) # Kept per user preference
}
