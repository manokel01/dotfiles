# Cleaned Minimalist Hypridle Configuration
# Optimized for ThinkPad P14s Professional Workflow

general {
    lock_cmd = pidof hyprlock || hyprlock       # runs hyprlock if it is not already running
    before_sleep_cmd = loginctl lock-session    # lock session before system sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # ensure screen wakes up after resume
    ignore_dbus_inhibit = false                 # allows browser/media to inhibit sleep
}

# 1. SCREEN DIM (Pre-lock warning)
listener {
    timeout = 300                                # 5 minutes
    on-timeout = brightnessctl set 10%           # dim screen
    on-resume = brightnessctl set 100%           # restore brightness
}

# 2. LOCK SESSION
listener {
    timeout = 330                                # 5.5 minutes
    on-timeout = loginctl lock-session           # trigger hyprlock
}

# 3. TURN OFF SCREEN (DPMS)
listener {
    timeout = 360                                # 6 minutes
    on-timeout = hyprctl dispatch dpms off       # physical screen off
    on-resume = hyprctl dispatch dpms on         # physical screen on
}

# 4. SUSPEND SYSTEM
# Automatically suspends the ThinkPad after 15 minutes of inactivity to save battery
listener {
    timeout = 900                                # 15 minutes
    on-timeout = systemctl suspend               # hardware suspend
}
