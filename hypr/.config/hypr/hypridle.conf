# Native Void: Adaptive Guillotine
# High-speed battery saving | Relaxed AC desk profile

general {
    lock_cmd = pidof hyprlock || hyprlock       
    before_sleep_cmd = loginctl lock-session && sleep 1
    after_sleep_cmd = hyprctl dispatch dpms on  
    ignore_dbus_inhibit = false                 
}

# --- STAGE 1: DIMMING ---
# Battery: 2.5m | AC: 9.0m
listener {
    timeout = 150                                
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && brightnessctl -s set 10%
    on-resume = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && brightnessctl -r
}
listener {
    timeout = 540                                
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 1 ] && brightnessctl -s set 10%
    on-resume = [ $(cat /sys/class/power_supply/AC/online) -eq 1 ] && brightnessctl -r
}

# --- STAGE 2: LOCKING ---
# Battery: 3.0m | AC: 10.0m
listener {
    timeout = 180                                
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && loginctl lock-session
}
listener {
    timeout = 600                                
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 1 ] && loginctl lock-session
}

# --- STAGE 3: DPMS ---
# Battery: 3.5m | AC: 11.0m
listener {
    timeout = 210                                
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && hyprctl dispatch dpms off
    on-resume = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && hyprctl dispatch dpms on
}
listener {
    timeout = 660                                
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 1 ] && hyprctl dispatch dpms off
    on-resume = [ $(cat /sys/class/power_supply/AC/online) -eq 1 ] && hyprctl dispatch dpms on
}

# --- STAGE 4: SUSPEND ---
# Battery only: 15.0m
listener {
    timeout = 900                                
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && systemctl suspend
}
