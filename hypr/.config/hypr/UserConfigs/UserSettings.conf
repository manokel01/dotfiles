general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(000000ff)
    layout = dwindle
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
        tap-to-click = true
    }
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = 0x000000
}

bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +"