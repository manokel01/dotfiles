# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# User Keybinds - Patched Vanilla Hyprland Layout

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# ---------------------------------------------------------
# 1. CORE WINDOW MANAGEMENT
# ---------------------------------------------------------
unbind = $mainMod, Q
bindd = $mainMod, Q, Open Terminal, exec, kitty

unbind = $mainMod, C
bindd = $mainMod, C, Close active window, killactive,

unbind = $mainMod, V
bindd = $mainMod, V, Toggle floating, togglefloating,

unbind = $mainMod, P
bindd = $mainMod, P, Pseudo tiling, pseudo,

unbind = $mainMod, J
bindd = $mainMod, J, Toggle split, togglesplit,

# ---------------------------------------------------------
# 2. PATCHED UTILITIES (Your specific stack)
# ---------------------------------------------------------
unbind = $mainMod, R
bindd = $mainMod, R, App Launcher, exec, rofi -show drun

unbind = $mainMod, E
bindd = $mainMod, E, File Manager, exec, thunar

unbind = $mainMod, M
bindd = $mainMod, M, Power Menu, exec, wlogout

# ---------------------------------------------------------
# 3. FOCUS & MOVEMENT
# ---------------------------------------------------------
unbind = $mainMod, left
bindd = $mainMod, left, Move focus left, movefocus, l

unbind = $mainMod, right
bindd = $mainMod, right, Move focus right, movefocus, r

unbind = $mainMod, up
bindd = $mainMod, up, Move focus up, movefocus, u

unbind = $mainMod, down
bindd = $mainMod, down, Move focus down, movefocus, d

# ---------------------------------------------------------
# 4. SCRATCHPAD (Special Workspace)
# ---------------------------------------------------------
unbind = $mainMod, S
bindd = $mainMod, S, Toggle scratchpad, togglespecialworkspace, magic

unbind = $mainMod SHIFT, S
bindd = $mainMod SHIFT, S, Move to scratchpad, movetoworkspace, special:magic

# ---------------------------------------------------------
# 5. ESSENTIAL EXTRAS
# ---------------------------------------------------------
# Screen Lock
unbind = $mainMod, L
bindd = $mainMod, L, Lock screen, exec, hyprlock

# Clipboard History
unbind = $mainMod SHIFT, V
bindd = $mainMod SHIFT, V, Clipboard history, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshot (Super + Shift + P for external keyboard compatibility)
unbind = $mainMod SHIFT, P
bindd = $mainMod SHIFT, P, Area screenshot, exec, grim -g "$(slurp)" - | swappy -f -

# Waybar Reload
unbind = $mainMod SHIFT, B
bindd = $mainMod SHIFT, B, Reload Waybar, exec, killall waybar && waybar & disown

# Note: Workspaces (Super + 1-0) and Mouse Dragging (Super + Left/Right Click) 
# are intentionally omitted here as they safely inherit from the base Keybinds.conf
